spring.application.name=ilubron

# H2 file database for development; swap to the postgres profile in production
spring.datasource.url=jdbc:h2:file:./data/ilubron;AUTO_SERVER=TRUE
spring.datasource.username=sa
spring.jpa.hibernate.ddl-auto=update
spring.h2.console.enabled=true

server.port=8080

# Comma-separated origins allowed to call the API
ilubron.cors-origins=http://127.0.0.1:8643,http://localhost:8643,https://ilutegu.ee

# Simple admin API token; override via env ILUBRON_ADMIN_TOKEN in production
ilubron.admin-token=${ILUBRON_ADMIN_TOKEN:dev-token-vaheta-ara}

# E-posti teavitused ("Ilutegu Bron" saatjanimega). Sisse lülitamiseks:
#   ILUBRON_MAIL_ENABLED=true + SMTP kasutaja/parool (nt Gmaili rakenduse parool)
ilubron.mail.enabled=${ILUBRON_MAIL_ENABLED:false}
ilubron.mail.from=${ILUBRON_MAIL_FROM:arlistalson@gmail.com}
ilubron.mail.from-name=Ilutegu Bron
ilubron.mail.salon-email=${ILUBRON_SALON_EMAIL:arlistalson@gmail.com}

spring.mail.host=${SMTP_HOST:smtp.gmail.com}
spring.mail.port=${SMTP_PORT:587}
spring.mail.username=${SMTP_USER:}
spring.mail.password=${SMTP_PASS:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
